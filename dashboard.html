<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedCare — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/screens/dashboard.css">
</head>
<body>
<div class="phone-frame">

  <!-- Top App Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="brand-logo">
        <span class="material-icons">medication</span>
        <span class="brand-name">MedCare</span>
      </div>
    </div>
    <div class="top-bar-actions" style="display:flex;align-items:center;gap:8px;">
      <!-- Dark mode toggle -->
      <label class="theme-toggle" title="Toggle dark mode">
        <input type="checkbox" id="themeToggle" onchange="handleTheme(this)">
        <span class="theme-toggle-slider"></span>
      </label>
      <!-- Avatar -->
      <div style="position:relative;">
        <button class="avatar-btn" id="avatarBtn" onclick="toggleRole()">A</button>
        <div class="role-chip" id="roleChip">Role: Admin</div>
      </div>
    </div>
  </div>

  <!-- Screen body -->
  <div class="screen-body">

    <!-- Greeting -->
    <div class="greeting-section">
      <div class="greeting-title" id="greetTitle">Good morning, Admin</div>
      <div class="greeting-date" id="greetDate"></div>
    </div>

    <!-- KPI cards -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card">
        <div class="kpi-icon blue"><span class="material-icons">payments</span></div>
        <div class="kpi-value" id="kpiSales">GH₵ 0.00</div>
        <div class="kpi-label">Today's sales</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon red"><span class="material-icons">warning</span></div>
        <div class="kpi-value" id="kpiLow">0</div>
        <div class="kpi-label">Low stock items</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon yellow"><span class="material-icons">schedule</span></div>
        <div class="kpi-value" id="kpiExp">0</div>
        <div class="kpi-label">Expiring soon</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon green"><span class="material-icons">medication</span></div>
        <div class="kpi-value" id="kpiTotal">0</div>
        <div class="kpi-label">Total drugs</div>
      </div>
    </div>

    <!-- Nav cards -->
    <div class="nav-grid" id="navGrid"></div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-tab active" data-page="dashboard" href="dashboard.html">
      <div class="nav-pill"><span class="material-icons">home</span></div>
      <span class="nav-tab-label">Home</span>
    </a>
    <a class="nav-tab" data-page="inventory" href="inventory.html">
      <div class="nav-pill"><span class="material-icons">inventory_2</span></div>
      <span class="nav-tab-label">Inventory</span>
    </a>
    <a class="nav-tab" data-page="sales" href="sales.html">
      <div class="nav-pill"><span class="material-icons">point_of_sale</span></div>
      <span class="nav-tab-label">Sales</span>
    </a>
    <a class="nav-tab" data-page="reports" href="reports.html">
      <div class="nav-pill"><span class="material-icons">bar_chart</span></div>
      <span class="nav-tab-label">Reports</span>
    </a>
    <a class="nav-tab" data-page="prescriptions" href="prescriptions.html">
      <div class="nav-pill"><span class="material-icons">more_horiz</span></div>
      <span class="nav-tab-label">More</span>
    </a>
  </nav>

</div>

<div class="snackbar" id="snackbar">
  <span class="material-icons" id="snack-icon">check_circle</span>
  <span id="snack-msg"></span>
</div>

<script src="../js/api.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/screens/dashboard.js"></script>
</body>
</html>
