<!-- ============================================================
   FILE: index.html (root)
   SCREEN: Splash Screen
   ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedCare PMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #2C7DA0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 0.6s ease forwards;
    }
    .splash-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash-icon .material-icons { font-size: 48px; color: #fff; }
    .splash-name { font-size: 28px; font-weight: 500; color: #fff; letter-spacing: 0.3px; }
    .splash-sub  { font-size: 14px; color: rgba(255,255,255,0.65); }
    .splash-version { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 8px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-icon">
      <span class="material-icons">medication</span>
    </div>
    <div class="splash-name">MedCare</div>
    <div class="splash-sub">Pharmacy Management System</div>
    <div class="splash-version">v1.0.0</div>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'login/';
    }, 2000);
  </script>
</body>
</html>
