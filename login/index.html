<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedCare — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/screens/login.css">
</head>
<body>

  <!-- Forgot password modal -->
  <div class="modal-backdrop" id="forgotModal">
    <div class="modal-card">
      <div class="modal-title">Forgot Password?</div>
      <div class="modal-body">
        Please contact your system administrator to reset your password.
        <br><br>
        <strong>Admin:</strong> admin@medcare.gh &nbsp;&middot;&nbsp; <strong>Tel:</strong> +233 59 26 28 958
      </div>
      <div class="modal-actions">
        <button class="modal-close" onclick="closeForgot()">Got it</button>
      </div>
    </div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-circle">
          <span class="material-icons">medication</span>
        </div>
        <div class="login-app-name" style="color: darkorange;">MedCare Pharmacy</div>
        <div class="login-app-sub">Pharmacy Management System</div>
      </div>

      <!-- Username -->
      <div class="input-group">
        <label class="input-label" for="username">Username</label>
        <div class="input-with-icon">
          <span class="material-icons input-icon-lead">person</span>
          <input
            class="input-field"
            type="text"
            id="username"
            placeholder="Enter username"
            autocomplete="username"
            oninput="clearError()"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-with-icon">
          <span class="material-icons input-icon-lead">lock</span>
          <input
            class="input-field"
            type="password"
            id="password"
            placeholder="Enter password"
            autocomplete="current-password"
            oninput="clearError()"
            onkeydown="if(event.key==='Enter') doLogin()"
          >
          <button class="input-icon-trail" id="eyeBtn" onclick="togglePassword()" aria-label="Toggle password">
            <span class="material-icons" id="eyeIcon">visibility</span>
          </button>
        </div>
        <div class="error-msg" id="errorMsg" style="display:none;">
          <span class="material-icons">error_outline</span>
          <span id="errorText">Invalid username or password</span>
        </div>
      </div>

      <!-- Forgot password -->
      <div class="forgot-wrap">
        <button class="forgot-link" onclick="openForgot()">Forgot password?</button>
      </div>

      <!-- Buttons -->
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
        <span id="loginBtnContent">Login</span>
      </button>
      <div style="height:10px;"></div>
      <button class="btn btn-outline" onclick="clearForm()">Cancel</button>

      <div class="login-divider"></div>
      <div class="login-version">v1.0.0 &nbsp;&middot;&nbsp; MedCare PMS</div>
    </div>
  </div>

  <div class="snackbar" id="snackbar">
    <span class="material-icons" id="snack-icon">check_circle</span>
    <span id="snack-msg"></span>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/screens/login.js"></script>
</body>
</html>
